workflows:
  ios-build:
    name: Spinly Wheel Decision iOS Build (Obfuscated)
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: 'Su Dang Van'

    environment:
      groups:
        - publishing

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.spinlywheel.decisionmaker

      vars:
        BUNDLE_ID: com.spinlywheel.decisionmaker
        XCODE_WORKSPACE: Runner.xcworkspace
        XCODE_SCHEME: Runner

      flutter: stable
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - ~/.pub-cache
        - $CM_BUILD_DIR/.dart_tool
        - $FCI_BUILD_DIR/ios/Pods
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Set Flutter version
        script: flutter --version

      - name: Clean and install Flutter dependencies
        script: |
          echo "=== Cleaning project ==="
          flutter clean

          echo "=== Installing dependencies ==="
          flutter pub get

      - name: Install iOS CocoaPods dependencies
        script: |
          cd ios
          pod install --repo-update

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles --warn-only
          # Save Codemagic-generated export options for flutter build
          mkdir -p "$CM_BUILD_DIR/ios"
          cp "$FCI_EXPORT_DIR/export_options.plist" "$CM_BUILD_DIR/ios/ExportOptions.plist" 2>/dev/null || true

      - name: Build iOS IPA with Obfuscation
        script: |
          echo "============================================"
          echo "🚀 Starting Build with Dart Obfuscation"
          echo "============================================"

          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f2 || echo "1")
          echo "📦 Version: $VERSION"
          echo "🔢 Build: $BUILD"

          EXPORT_OPTIONS="$CM_BUILD_DIR/ios/ExportOptions.plist"
          if [ ! -f "$EXPORT_OPTIONS" ]; then
            echo "⚠️  ExportOptions.plist not found — generating manually"
            cat > "$EXPORT_OPTIONS" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>697X622429</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.spinlywheel.decisionmaker</key>
                  <string>Lucky Wheel  Decision</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          PLIST
          fi

          flutter build ipa \
            --release \
            --obfuscate \
            --split-debug-info=build/ios/symbols \
            --build-name=$VERSION \
            --build-number=$BUILD \
            --export-options-plist="$EXPORT_OPTIONS" \
            --verbose

          echo "✅ Build + signing completed"

          # Collect dSYMs from the latest archive
          mkdir -p build/ios/dSYMs
          LATEST_ARCHIVE=$(ls -td "$HOME/Library/Developer/Xcode/Archives"/*.xcarchive 2>/dev/null | head -1)
          if [ -n "$LATEST_ARCHIVE" ] && [ -d "$LATEST_ARCHIVE/dSYMs" ]; then
            cp -r "$LATEST_ARCHIVE/dSYMs/"* build/ios/dSYMs/
            echo "✅ dSYMs saved"
          fi

          echo "🎉 Done!"
          echo "============================================"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/dSYMs/**
      - build/ios/symbols/**

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true