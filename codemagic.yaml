workflows:
  ios-build:
    name: Spinly Wheel Decision iOS Build (Obfuscated)
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: 'Su Dang Van'

    environment:
      groups:
        - publishing

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.spinlywheel.decisionmaker

      vars:
        BUNDLE_ID: com.spinlywheel.decisionmaker
        XCODE_WORKSPACE: Runner.xcworkspace
        XCODE_SCHEME: Runner

      flutter: stable
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - ~/.pub-cache
        - $CM_BUILD_DIR/.dart_tool
        - $FCI_BUILD_DIR/ios/Pods
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Set Flutter version
        script: flutter --version

      - name: Clean and install Flutter dependencies
        script: |
          echo "=== Cleaning project ==="
          flutter clean

          echo "=== Installing dependencies ==="
          flutter pub get

      - name: Install iOS CocoaPods dependencies
        script: |
          cd ios
          pod install --repo-update

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles --warn-only

          # Codemagic writes export_options.plist to /Users/builder/export_options.plist
          # Copy it into ios/ so flutter build ipa can find it
          if [ -f /Users/builder/export_options.plist ]; then
            cp /Users/builder/export_options.plist ios/ExportOptions.plist
            echo "Copied export_options.plist to ios/ExportOptions.plist"
          else
            echo "Codemagic export_options.plist not found, creating from scratch"
            /usr/libexec/PlistBuddy -c "Add :method string app-store" ios/ExportOptions.plist
            /usr/libexec/PlistBuddy -c "Add :teamID string 697X622429" ios/ExportOptions.plist
            /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" ios/ExportOptions.plist
            /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.spinlywheel.decisionmaker string 'Lucky Wheel  Decision'" ios/ExportOptions.plist
            /usr/libexec/PlistBuddy -c "Add :signingCertificate string Apple Distribution" ios/ExportOptions.plist
            /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" ios/ExportOptions.plist
          fi
          echo "=== ExportOptions.plist contents ==="
          cat ios/ExportOptions.plist

      - name: Build iOS IPA with Obfuscation
        script: |
          echo "============================================"
          echo "🚀 Starting Build with Dart Obfuscation"
          echo "============================================"

          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f2 || echo "1")
          echo "📦 Version: $VERSION"
          echo "🔢 Build: $BUILD"

          flutter build ipa \
            --release \
            --obfuscate \
            --split-debug-info=build/ios/symbols \
            --build-name=$VERSION \
            --build-number=$BUILD \
            --export-options-plist=ios/ExportOptions.plist \
            --verbose

          echo "✅ Build + signing completed"

          # Collect dSYMs from the latest archive
          mkdir -p build/ios/dSYMs
          LATEST_ARCHIVE=$(ls -td "$HOME/Library/Developer/Xcode/Archives"/*.xcarchive 2>/dev/null | head -1)
          if [ -n "$LATEST_ARCHIVE" ] && [ -d "$LATEST_ARCHIVE/dSYMs" ]; then
            cp -r "$LATEST_ARCHIVE/dSYMs/"* build/ios/dSYMs/
            echo "✅ dSYMs saved"
          fi

          echo "🎉 Done!"
          echo "============================================"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/dSYMs/**
      - build/ios/symbols/**

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true